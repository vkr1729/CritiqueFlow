<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Risk Audit Harness</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <div id="header-title">Model Risk Audit Harness</div>
  <div id="status-dot"></div>
</header>

<div id="app-layout">
  <aside id="sidebar">
    <div id="sidebar-tabs">
      <button class="tab-btn active" data-tab="files">Files</button>
      <button class="tab-btn" data-tab="history">History</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </div>

    <div id="tab-files" class="tab-panel active">
      <section id="folder-section">
        <label for="folder-path">Working Folder</label>
        <div class="input-row">
          <input type="text" id="folder-path" placeholder="/absolute/path/to/folder">
          <button id="btn-load-files">Load</button>
        </div>
      </section>
      <section id="file-list-section">
        <h3>Available Files</h3>
        <div id="file-list"></div>
      </section>
    </div>

    <div id="tab-history" class="tab-panel">
      <div id="session-list"></div>
      <button id="btn-clear-history" class="btn-danger">Clear All History</button>
    </div>

    <div id="tab-settings" class="tab-panel">
      <div id="settings-subtabs">
        <button class="subtab-btn active" data-subtab="env">Environment</button>
        <button class="subtab-btn" data-subtab="prompt-auditor">Auditor</button>
        <button class="subtab-btn" data-subtab="prompt-evaluator">Evaluator</button>
        <button class="subtab-btn" data-subtab="skills">Skills</button>
      </div>
      <div id="subtab-env" class="subtab-panel active">
        <div id="env-editor"></div>
      </div>
      <div id="subtab-prompt-auditor" class="subtab-panel">
        <textarea id="prompt-auditor-editor" rows="20" placeholder="Loading..."></textarea>
      </div>
      <div id="subtab-prompt-evaluator" class="subtab-panel">
        <textarea id="prompt-evaluator-editor" rows="20" placeholder="Loading..."></textarea>
      </div>
      <div id="subtab-skills" class="subtab-panel">
        <button id="btn-learn-skills">Learn from History</button>
        <div id="skills-list"></div>
      </div>
    </div>
  </aside>

  <main id="main-panel">
    <section id="query-section">
      <label for="query-input">Audit Query</label>
      <textarea id="query-input" rows="4" placeholder="Enter your audit question here..."></textarea>
      <button id="btn-run-harness">Run Harness</button>
      <div id="loading-spinner" class="hidden"></div>
      <div id="query-error" class="error-msg hidden"></div>
      <div id="export-success" class="success-msg hidden"></div>
    </section>

    <section id="results-section" class="hidden">
      <div id="results-header">
        <h2>Results</h2>
        <div id="results-meta"></div>
        <button id="btn-export">Export Markdown</button>
      </div>
      <div id="results-content"></div>
    </section>

    <section id="chain-section" class="hidden">
      <h2>Interaction Chain</h2>
      <div id="chain-viewer"></div>
    </section>
  </main>
</div>

<footer>
  <span id="footer-status">Ready</span>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
